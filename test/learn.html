<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Deutsch Vocab · 德语背单词</title>
    <link rel="stylesheet" href="css/learn.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="tabs" role="tablist" aria-label="主导航">
        <button class="tab" role="tab" data-view="study" aria-selected="true">学习</button>
        <button class="tab" role="tab" data-view="quiz" aria-selected="false">测验</button>
        <button class="tab" role="tab" data-view="wrong" aria-selected="false">错词本</button>
        <button class="tab" role="tab" data-view="settings" aria-selected="false">设置/打卡</button>
      </div>
    </div>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <aside class="panel settings-panel">
      <div class="settings-tools">
        <div class="brand" title="Deutsch Vocab">
          <div class="logo">DE</div>
          <div>Deutsch Vocab</div>
        </div>
        <div class="top-actions">
          <button id="btn-export" class="btn-ghost" title="Export all app data">Export</button>
          <button id="btn-import" class="btn-ghost" title="Import app data">Import</button>
        </div>
      </div>
      <div class="hd">
        <div>
          <h2>词库选择</h2>
          <p class="sub">从 <span style="font-family:var(--mono)">dictionary.json</span> 动态加载，并可多选单元合并。</p>
        </div>
        <span class="pill" id="pill-status">未加载</span>
      </div>
      <div class="bd">
        <div class="col">
          <div class="col" style="gap:6px">
            <label for="sel-dict">词库</label>
            <select id="sel-dict"></select>
          </div>

          <div class="row">
            <button id="btn-select-all" class="btn-small">全选单元</button>
            <button id="btn-select-none" class="btn-small">全不选</button>
          </div>

          <div class="units" id="units"></div>

          <div class="divider"></div>

          <div class="row">
            <div style="flex:1; min-width:200px">
              <label for="sel-order">排序</label>
              <select id="sel-order">
                <option value="as-is">按原顺序</option>
                <option value="az">按字母 A→Z</option>
                <option value="za">按字母 Z→A</option>
                <option value="shuffle">乱序</option>
              </select>
            </div>
            <button id="btn-load" class="btn-primary" style="flex:0 0 auto">加载所选单元</button>
          </div>

          <div class="divider"></div>

          <div class="row" style="justify-content:space-between">
            <span class="pill" id="pill-selected">已选 0 个单元</span>
            <span class="pill" id="pill-words">0 词</span>
            <span class="pill" id="pill-chunks">0 块</span>
          </div>

          <div class="hint" id="hint-fetch" style="display:none">
            <b>读取失败提示：</b><br/>
            本应用必须使用 <code>fetch()</code> 读取 <code>dictionary.json</code> 与单元文件。若你直接用 <code>file://</code> 打开，浏览器可能会阻止本地 fetch。<br/>
            ✅ 推荐：部署到 GitHub Pages / 任意静态服务器，或用 VS Code Live Server 打开。
          </div>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main class="panel content">
      <div class="view" id="view-root"></div>
    </main>
  </div>

  <div class="toast-wrap" id="toast-wrap" aria-live="polite" aria-atomic="true"></div>

  <!-- Import modal -->
  <div class="modal-backdrop" id="modal-import">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="import-title">
      <div class="mh">
        <h3 id="import-title">导入数据</h3>
        <button class="btn-ghost" id="import-close" aria-label="关闭">✕</button>
      </div>
      <div class="mb">
        <div class="hint">
          将导入你之前导出的 JSON 文件（仅覆盖 <code>de_vocab_*</code> 相关键）。导入后页面会自动刷新以应用数据。
        </div>
        <input type="file" id="import-file" accept="application/json" />
        <div class="row" style="justify-content:flex-end">
          <button id="import-cancel">取消</button>
          <button class="btn-primary" id="import-confirm">导入并刷新</button>
        </div>
      </div>
    </div>
  </div>

<script src="js/learn.js"></script>
</div>
</body>
</html>
